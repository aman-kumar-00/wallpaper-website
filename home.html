<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Home Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	margin: 0;
	padding: 0;
}

ul {
	list-style-type: none;
	margin: 0;
	padding: 0;
	overflow: hidden;
	background-color: #333333;
}

ul li {
	float: left;
}

ul li a {
	display: block;
	color: white;
	text-align: center;
	padding: 14px 16px;
	text-decoration: none;
}

ul li a:hover {
	background-color: #111111;
}

.navbar-select {
	background-color: #333;
	color: white;
	border: 7px solid #555;
}

.navbar-select option {
	background-color: white;
	color: black;
}


.wallpaper-card {

height: 300px;          

overflow: hidden;

border-radius: 10px;

}

.wallpaper-img {

width: 100%;

height: 220px;         

object-fit: cover;      

background-color: #eee; 

}

.card-body {

height: 80px;

display: flex;

align-items: center;

justify-content: center;

}

.card-title {

font-size: 16px;

font-weight: 600;

margin: 0;

}


</style>

</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">

			<!-- Logo -->
			<a class="navbar-brand" href="home.html"> <img
				src="Image/paint.png" alt="Logo" height="40">
			</a>

			<!-- Toggle button (mobile) -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarContent">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarContent">

				<!-- Left menu -->
				<ul class="navbar-nav">
					<li class="nav-item"><a class="nav-link active"
						href="home.html">Home</a></li>

					<li class="navbar-select"><label for="category">Category:</label>
						<select name="category" id="category">
							<option value=1>Nature</option>
							<option value=2>Sports</option>
							<option value=3>Vehicle</option>
							<option value=4>City</option>
					</select></li>
				</ul>

				<!-- Center Search -->
				<form class="d-flex mx-auto" role="search">
					<input class="form-control me-2" type="search" placeholder="Search">
					<button class="btn btn-outline-light" type="submit">Search</button>
				</form>

				<!-- Right menu -->
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="login.html">Login</a>
					<li class="nav-item"><a class="nav-link" href="SignUp.html">SignUp</a>

					</li>
				</ul>

			</div>
		</div>
	</nav>

	<h3 class="text-center mt-4">HD Wallpaper Images & Pictures</h3>

	<div class="container mt-4">

		<div class="row g-4" id="wallpaperContainer"></div>

	</div>



	<script>

let page = 1;

function loadWallpapers(){
	//alert("called");
	fetch("Home?page=" + page)
		.then(res => res.text())
		.then(data => {document.getElementById("wallpaperContainer").innerHTML += data;
		
		page++;
	});

}

// First load
loadWallpapers();

</script>


</body>
</html>
