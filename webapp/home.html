<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Home Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	margin: 0;
	padding: 0;
}

ul {
	list-style-type: none;
	margin: 0;
	padding: 0;
	overflow: hidden;
	background-color: #333333;
}

ul li {
	float: left;
}

ul li a {
	display: block;
	color: white;
	text-align: center;
	padding: 14px 16px;
	text-decoration: none;
}

ul li a:hover {
	background-color: #111111;
}

.navbar-select {
	background-color: #333;
	color: white;
	border: 7px solid #555;
}

.navbar-select option {
	background-color: white;
	color: black;
}

/* CARD */
.wallpaper-card {
	border-radius: 10px;
	overflow: hidden;
	position: relative;
}

.wallpaper-img {
	width: 100%;
	height: 100%;
	object-fit: cover;
}

.wallpaper-img {
	width: 100%;
	height: 100%;
	object-fit: cover;
}

/* DOWNLOAD */
.download-btn {
	position: absolute;
	top: 10px;
	right: 10px;
	background: rgba(255, 255, 255, 0.8);
	border-radius: 50%;
	padding: 6px;
}

.download-icon {
	width: 26px;
	height: 26px;
}
</style>

</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">

			<!-- Logo -->
			<a class="navbar-brand" href="home.html"> <img
				src="Image/paint.png" alt="Logo" height="40">
			</a>

			<!-- Toggle button (mobile) -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarContent">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarContent">

				<!-- Left menu -->
				<ul class="navbar-nav">
					<li class="nav-item"><a class="nav-link active"
						href="home.html">Home</a></li>

					<li class="navbar-select"><label for="category">Category:</label>

						<select name="category" id="categoryId"
						onchange="changeCategory()">

							<option value="0">All</option>
							<option value="1">Nature</option>
							<option value="2">Space</option>
							<option value="3">Vehicle</option>
							<option value="4">City</option>
							<option value="5">Games</option>

					</select></li>
				</ul>

				<!-- Center Search -->
				<form class="d-flex mx-auto" onsubmit="searchWallpaper(event)">

					<input class="form-control me-2" type="search"
						placeholder="Search wallpapers..." id="searchInput">

					<button class="btn btn-outline-light" type="submit">

						Search</button>

				</form>


				<ul class="navbar-nav ms-auto align-items-center">


					<li class="nav-item me-4"><a class="btn btn-success"
						href="Uploadform.html"> UploadWallpaper </a></li>

				</ul>

				<!-- Right menu -->
				<ul class="navbar-nav ms-auto">

					<li class="nav-item"><a class="nav-link" href="Logout">

							Logout </a></li>

				<!-- <li class="nav-item"><a class="nav-link" href="login.html">Login</a>
					<li class="nav-item"><a class="nav-link" href="SignUp.html">SignUp</a>

					</li>  -->	
				</ul>





			</div>
		</div>
	</nav>

	<h3 class="text-center mt-4">Wallpaper</h3>

	<div class="container mt-4">

		<div class="row g-4" id="wallpaperContainer"></div>

	</div>



	<script>

let page = 1;

let currentCategory = 0; // show ALL first

let isLoading = false;

let hasMoreData = true;

/* CATEGORY CHANGE */

function changeCategory(){

currentCategory =
document.getElementById("categoryId").value;

page = 1;

hasMoreData = true;

/* Clear container */

document.getElementById(
"wallpaperContainer"
).innerHTML = "";

/* Load new category */

loadWallpapers();

}

/* MAIN LOADER */

function loadWallpapers(){

if(isLoading || !hasMoreData) return;

isLoading = true;

/* Get search keyword */

let keyword = "";

let searchBox =
document.getElementById("searchInput");

if(searchBox){

keyword = searchBox.value.trim();

}

/* Fetch from servlet */

fetch(
"Home?page=" + page +
"&categoryId=" + currentCategory +
"&tags=" + keyword
)

.then(response => response.text())

.then(data => {

/* No more data */

if(data.trim() === ""){

hasMoreData = false;

isLoading = false;

return;

}

/* Append cards */

document.getElementById(
"wallpaperContainer"
).innerHTML += data;

/* Next page */

page++;

isLoading = false;

})

.catch(error => {

console.log("Fetch error:", error);

isLoading = false;

});

}

/* INFINITE SCROLL */

window.addEventListener("scroll", function(){

let scrollTop =
window.scrollY;

let windowHeight =
window.innerHeight;

let documentHeight =
document.documentElement.scrollHeight;

if(

scrollTop + windowHeight
>= documentHeight - 200

){

loadWallpapers();

}

});

/* SEARCH */

function searchWallpaper(event){

event.preventDefault();

/* Reset */

page = 1;

hasMoreData = true;

document.getElementById(
"wallpaperContainer"
).innerHTML = "";

/* Load search */

loadWallpapers();

}

/* FIRST LOAD */

window.onload = function(){

loadWallpapers();

};

</script>

</body>
</html>
