<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Upload Wallpaper</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>

/* Background */
body {
	background: linear-gradient(135deg, #1f2937, #111827);
	min-height: 100vh;
}

/* Card */
.upload-card {
	max-width: 520px;
	margin: 70px auto;
	padding: 30px;
	border-radius: 16px;
	background: #ffffff;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

/* Title */
.upload-title {
	text-align: center;
	font-size: 26px;
	font-weight: 600;
	margin-bottom: 20px;
}

/* Inputs */
.form-control, .form-select {
	border-radius: 10px;
	padding: 10px;
}

/* File input style */
input[type="file"] {
	padding: 8px;
	background: #f1f5f9;
	cursor: pointer;
}

/* Button */
.btn-upload {
	width: 100%;
	border-radius: 10px;
	font-size: 18px;
	padding: 10px;
}

/* Hover effect */
.btn-upload:hover {
	transform: scale(1.02);
}

/* Preview images */
.preview-container {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 10px;
	margin-top: 10px;
}

.preview-img {
	width: 100%;
	height: 90px;
	object-fit: cover;
	border-radius: 8px;
}

/* Labels */
label {
	font-weight: 500;
	margin-bottom: 5px;
}
</style>

</head>

<body>

	<div class="upload-card">

		<div class="upload-title">Upload Wallpapers</div>

		<form action="UploadWallpaper" method="post"
			enctype="multipart/form-data">

			<!-- Prefix -->

			<label>Title Prefix</label> <input type="text" name="titlePrefix"
				placeholder="Optional (e.g. Nature)" class="form-control mb-3">

			<!-- Tags -->

			<label>Tags</label> <input type="text" name="tags"
				placeholder="nature, forest, sunset" class="form-control mb-3"
				required>

			<!-- Category -->

			<label>Category</label> <select name="categoryId"
				class="form-select mb-3">

				<option value="1">Nature</option>
				<option value="2">Space</option>
				<option value="3">Vehicle</option>
				<option value="4">City</option>
				<option value="5">Games</option>

			</select>

			<!-- File Upload -->

			<label>Select Images</label> <input type="file" name="images"
				multiple accept="image/*" class="form-control mb-3"
				onchange="previewImages(event)" required>

			<!-- Preview -->

			<div id="previewContainer" class="preview-container"></div>

			<!-- Submit -->

			<button type="submit" class="btn btn-success btn-upload">

				Upload Wallpapers</button>

		</form>

	</div>

	<script>
		/* Image preview */

		function previewImages(event) {

			let files = event.target.files;

			let container = document.getElementById("previewContainer");

			container.innerHTML = "";

			for (let i = 0; i < files.length; i++) {

				let img = document.createElement("img");

				img.src = URL.createObjectURL(files[i]);

				img.className = "preview-img";

				container.appendChild(img);

			}

		}
	</script>

</body>
</html>
