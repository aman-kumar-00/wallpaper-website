<form action="UploadWallpaper" method="post"
	enctype="multipart/form-data">

	<input type="text" name="title" placeholder="Wallpaper Title"
		class="form-control mb-2" required> <input type="file"
		name="image" class="form-control mb-2" required> <select
		name="category_id" class="form-control mb-2">

		<option value="1">Nature</option>
		<option value="2">City</option>
		<option value="3">Space</option>

	</select>

	<button class="btn btn-primary">Upload</button>

</form>
