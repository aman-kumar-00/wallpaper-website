<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SignUp</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style id="bgcss">
body {
	background-size: cover;
	background-position: center;
	height: 100vh;
}
</style>

</head>

<body class="bg-light">

	<div class="container">

		<div class="row justify-content-center mt-5">

			<div class="col-md-4">

				<div class="card shadow">

					<div class="card-body">

						<h3 class="text-center mb-4">Create Account</h3>

						<form action="SignUp" method="post">
						
						
						<div class="mb-3">
								<label class="form-label">UserName</label> <input type="UserName"
									name="UserName" class="form-control" placeholder="Enter UserName"
									required>
							</div>

							<div class="mb-3">
								<label class="form-label">Email</label> <input type="email"
									name="email" class="form-control" placeholder="Enter email"
									required>
							</div>

							<div class="mb-3">
								<label class="form-label">Password</label> <input
									type="password" name="password" class="form-control"
									placeholder="Enter password" required>
							</div>

							<div class="mb-3">
								<label class="form-label">Confirm Password</label> <input
									type="password" name="confirm_password" class="form-control"
									placeholder="Confirm password" required>
							</div>

							<button type="submit" class="btn btn-primary w-100">
								SignUp</button>

						</form>

						<div class="text-center mt-3">

							Already have an account? <a href="login.html">Login</a>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>

	<script id="randLocalBg2">

window.onload = function(){

const Image = [
"Image/bg1.jpg",
"Image/bg2.jpg",
"Image/bg3.jpg",
"Image/bg4.jpg",
"Image/bg5.jpg",
"Image/bg6.jpg",
"Image/bg7.jpg",
"Image/bg8.jpg",
"Image/bg9.jpg",
];

const randomImage = Image[Math.floor(Math.random() * Image.length)];

document.body.style.backgroundImage = "url('" + randomImage + "')";

};

</script>

</body>
</html>
